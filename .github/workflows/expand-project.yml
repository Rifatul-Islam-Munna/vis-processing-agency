name: Expand verified Visim project

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: expand-visim-project
  cancel-in-progress: false

jobs:
  expand-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Expand complete Next.js source bundle
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const zlib = require('node:zlib');
          const { execFileSync } = require('node:child_process');

          const vendor = path.join(process.cwd(), 'vendor');
          const parts = fs.readdirSync(vendor)
            .filter((name) => name.startsWith('project-source.part-'))
            .sort();
          if (parts.length !== 11) {
            throw new Error(`Expected 11 source parts, found ${parts.length}`);
          }
          const encoded = parts
            .map((name) => fs.readFileSync(path.join(vendor, name), 'utf8').trim())
            .join('');
          const compressed = Buffer.from(encoded, 'base64');
          const tar = zlib.brotliDecompressSync(compressed);
          fs.writeFileSync('/tmp/visim-project.tar', tar);
          execFileSync('tar', ['-xf', '/tmp/visim-project.tar', '-C', process.cwd()], { stdio: 'inherit' });
          console.log(`Expanded ${parts.length} source parts.`);
          NODE

      - name: Restore exact original Visim theme assets
        shell: bash
        run: |
          rm -rf /tmp/visim-upstream
          git init -q /tmp/visim-upstream
          git -C /tmp/visim-upstream remote add origin https://github.com/Kurosagiiii/Study-Abroad.git
          git -C /tmp/visim-upstream fetch -q --depth 1 origin d5ebee6ff7148d5e08985bd2c66f0ed973fb91f5
          git -C /tmp/visim-upstream checkout -q FETCH_HEAD
          test -f /tmp/visim-upstream/visim/assets/css/main.css
          rm -rf public/assets
          mkdir -p public
          cp -a /tmp/visim-upstream/visim/assets public/assets

      - name: Restore original asset paths and standalone package scripts
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const map = JSON.parse(fs.readFileSync('vendor/webp-map.json', 'utf8'));
          const pagesPath = 'content/default-pages.json';
          let pages = fs.readFileSync(pagesPath, 'utf8');
          for (const [original, optimized] of Object.entries(map)) {
            pages = pages.split(optimized).join(original);
          }
          fs.writeFileSync(pagesPath, pages);

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          for (const name of ['predev', 'prebuild', 'postinstall']) delete pkg.scripts[name];
          fs.writeFileSync('package.json', `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
          rm -f scripts/restore-template-assets.mjs
          sed -i '\|^public/assets$|d' .gitignore

      - name: Install and verify
        run: |
          npm ci
          npm run verify
          npm run typecheck
          npm run lint
          npm run build

      - name: Publish expanded standalone project to main
        shell: bash
        run: |
          rm -rf vendor bootstrap.mjs .github/workflows/expand-project.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m 'Expand complete Visim Next.js CMS [skip ci]'
          git push origin HEAD:main
