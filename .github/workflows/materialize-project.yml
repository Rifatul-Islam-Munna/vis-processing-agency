name: Verify and materialize project

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/materialize-project.yml
      - app/**
      - components/**
      - content/**
      - lib/**
      - public/site.webmanifest
      - scripts/**
      - bootstrap.mjs
      - package.json
      - vendor/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-vis-project
  cancel-in-progress: false

jobs:
  verify-and-materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore checked-in ZIP assets
        run: node bootstrap.mjs

      - name: Confirm required source and archives
        run: |
          test -f content/default-pages.part-01.b64
          test -f content/default-pages.part-04.b64
          test -f vendor/template-assets.part-000.txt
          test -f vendor/template-assets.part-011.txt
          test -f app/admin/page.tsx
          test -f app/login/page.tsx
          test -f lib/db.ts
          test -f public/assets/css/main.css
          test -f public/assets/js/main.js
          test -f public/site.webmanifest

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Verify imported pages and assets
        run: npm run verify

      - name: Type-check
        run: npm run typecheck

      - name: Production build
        env:
          AUTH_SECRET: build-only-secret-that-is-longer-than-thirty-two-characters
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
          ALLOW_REGISTRATION: "true"
        run: npm run build

      - name: Production route smoke test
        env:
          AUTH_SECRET: build-only-secret-that-is-longer-than-thirty-two-characters
          NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
          ALLOW_REGISTRATION: "true"
        shell: bash
        run: |
          npm run start > /tmp/vis-server.log 2>&1 &
          SERVER_PID=$!
          cleanup() { kill "$SERVER_PID" 2>/dev/null || true; }
          trap cleanup EXIT
          curl --retry 30 --retry-connrefused --retry-delay 1 --fail --silent http://127.0.0.1:3000/ >/dev/null
          routes=(
            / /home-2 /home-3 /home-4 /home-5 /about /blog-classic /blog-details
            /blog-grid /cart /checkout /contact /country-details /country-list
            /course-details /course-v1 /error /faq /services-details /services
            /shop-details /shop /team-details /team /testimonial /login /register
            /robots.txt /sitemap.xml /site.webmanifest /assets/css/main.css /assets/js/main.js
          )
          for route in "${routes[@]}"; do
            echo "Checking $route"
            curl --fail --silent "http://127.0.0.1:3000$route" >/dev/null
          done

      - name: Record successful verification
        shell: bash
        run: |
          cat > VERIFICATION.md <<EOF
          # Verified build

          Source commit: ${GITHUB_SHA}

          The GitHub Actions workflow successfully completed:

          - ZIP asset restoration and checksum validation
          - 25-page and route integrity verification
          - local asset reference verification
          - TypeScript checking
          - Next.js production build
          - live HTTP smoke checks for every imported public route, authentication pages, SEO endpoints and core theme assets
          EOF

      - name: Commit verified assets and lockfile
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f public/assets
          git add public/site.webmanifest package-lock.json VERIFICATION.md
          if git diff --cached --quiet; then
            echo "Verified files are already materialized."
            exit 0
          fi
          git commit -m "Materialize and verify complete Visim project [skip ci]"
          git push origin HEAD:main
