name: Materialize verified project

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/materialize-project.yml
      - bootstrap.mjs
      - package.json
      - vendor/**
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-vis-project
  cancel-in-progress: false

jobs:
  materialize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Restore checked-in project and ZIP assets
        run: node bootstrap.mjs

      - name: Confirm required source and assets
        shell: bash
        run: |
          test -f content/default-pages.json
          test -f app/admin/page.tsx
          test -f app/login/page.tsx
          test -f lib/db.ts
          test -f public/assets/css/main.css
          test -f public/assets/js/main.js

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify imported pages and assets
        run: npm run verify

      - name: Type-check
        run: npm run typecheck

      - name: Production build
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/vis-processing-agency-build
          AUTH_SECRET: build-only-secret-that-is-longer-than-thirty-two-characters
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
        run: npm run build

      - name: Commit materialized application to main
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Project files are already materialized."
            exit 0
          fi
          git commit -m "Materialize verified Next.js CMS project [skip ci]"
          git push origin HEAD:main
